server {
    listen 80;

    # 1. 静态页面处理
    location / {
        root /var/www/localhost/htdocs;
        index src/index.html;
    }

    # 2. 动态请求转发（反向代理）
    location /api {
        # 核心：使用 compose 里的服务名 api-service
        proxy_pass http://api-service:5678;
        
        # 运维小技巧：转发时带上原始请求头，方便后端审计
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}