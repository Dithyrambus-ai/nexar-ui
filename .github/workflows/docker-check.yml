name: Build and Push Docker Image # 流水线的名字

on:
  push:
    branches: [ "main" ]  # 当 main 分支有代码推送时触发

jobs:
  build-and-push:   # 任务 ID
    runs-on: ubuntu-latest  # 在 GitHub 提供的最新版 Ubuntu 虚拟机上运行
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code   # 第一步：把你的代码拉取到虚拟机里
        uses: actions/checkout@v4

      # 1. 登录到 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx   # 第二步：初始化 Docker 构建环境
        uses: docker/setup-buildx-action@v3

      # 2. 构建并推送镜像
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # tags 中使用 latest 代表最新版，sha 代表带版本的精确镜像
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexar-ui:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nexar-ui:${{ github.sha }}

      - name: Verify Deployment
        run: echo "镜像已成功推送到 Docker Hub! 地址为：${{ secrets.DOCKERHUB_USERNAME }}/nexar-ui:latest"