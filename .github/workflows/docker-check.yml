name: Docker Build Check # 流水线的名字

on:
  push:
    branches: ["main"] # 当 main 分支有代码推送时触发
  pull_request:
    branches: ["main"] # 当有人提 PR 时触发

jobs:
  build-and-test: # 任务 ID
    runs-on: ubuntu-latest # 在 GitHub 提供的最新版 Ubuntu 虚拟机上运行

    steps:
      - name: Checkout code # 第一步：把你的代码拉取到虚拟机里
        uses: actions/checkout@v4

      - name: Set up Docker Buildx # 第二步：初始化 Docker 构建环境
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image # 第三步：尝试构建镜像，检查 Dockerfile 有没有写错
        run: |
          docker build -t my-test-app:${{ github.sha }} .
          echo "构建成功！"

      - name: Run Compose Test # 第四步：尝试用 Compose 跑起来看看能不能启动
        run: |
          docker compose up -d
          sleep 5
          docker compose ps
